<section class="max-w-4xl mx-auto p-6 px-4 sm:px-6 lg:px-8 pb-10">
  <div class="text-sm breadcrumbs mb-4">
    <ul>
      <li><a routerLink="/">Home</a></li>
      <li><a routerLink="/order">Courses</a></li>
      @if (course) {
        <li>
          <a [routerLink]="['/course', courseId]">{{ course.title }}</a>
        </li>
        <li>Edit</li>
      }
    </ul>
  </div>

  <div class="flex items-center justify-center">
    <div class="w-full space-y-8">
      <div class="">
        <h2 class="text-3xl font-bold mb-2">Edit Course</h2>
        <p class="text-gray-600">Update the details of the existing course.</p>
      </div>

      @if (loading()) {
        <div class="text-center">
          <span class="loading loading-dots loading-lg"></span>
        </div>
      } @else {
        <app-course-form [recievedCourse]="course"></app-course-form>
      }
    </div>
  </div>
</section>
